<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vaultr — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080808;
    --surface: #101010;
    --card: #141414;
    --card-hover: #1c1c1c;
    --border: #222;
    --border-bright: #333;
    --accent: #c6f135;
    --accent-dim: rgba(198,241,53,0.1);
    --accent-glow: rgba(198,241,53,0.18);
    --text: #f0efe8;
    --muted: #555;
    --dim: #333;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* NOISE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* GLOW */
  body::after {
    content: '';
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── AVATAR / MARK ── */
  .avatar {
    width: 72px; height: 72px;
    background: var(--accent);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(198,241,53,0.25);
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .avatar svg { width: 36px; height: 36px; }

  /* ── NAME ── */
  .name {
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    text-align: center;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  .name span { color: var(--accent); }

  /* ── HANDLE ── */
  .handle {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 6px;
    margin-bottom: 6px;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  /* ── BIO ── */
  .bio {
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    max-width: 320px;
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.32s ease both;
  }

  .bio strong { color: var(--text); font-weight: 500; }

  /* ── DIVIDER ── */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s 0.38s ease both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ── LINKS ── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.18s, border-color 0.18s, transform 0.18s;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.45s ease both;
  }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--accent-dim), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .link-item:hover {
    background: var(--card-hover);
    border-color: var(--border-bright);
    transform: translateX(3px);
  }

  .link-item:hover::before { opacity: 1; }
  .link-item:hover .link-arrow { opacity: 1; transform: translate(2px, -2px); }

  /* Featured link */
  .link-item.featured {
    border-color: rgba(198,241,53,0.25);
    background: rgba(198,241,53,0.05);
  }

  .link-item.featured:hover {
    border-color: var(--accent);
    background: rgba(198,241,53,0.09);
  }

  .link-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    position: relative; z-index: 1;
  }

  .link-item.featured .link-icon {
    background: var(--accent);
    border-color: var(--accent);
  }

  .link-item.featured .link-icon svg,
  .link-item.featured .link-icon span {
    color: #080808;
  }

  .link-body {
    flex: 1;
    position: relative; z-index: 1;
  }

  .link-title {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }

  .link-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .link-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(198,241,53,0.2);
    padding: 2px 8px;
    border-radius: 100px;
    position: relative; z-index: 1;
    white-space: nowrap;
  }

  .link-arrow {
    color: var(--dim);
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.18s;
    position: relative; z-index: 1;
  }

  /* ── FOOTER ── */
  .page-footer {
    margin-top: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-align: center;
    animation: fadeUp 0.5s 0.8s ease both;
    opacity: 0;
  }

  .page-footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .page-footer a:hover { color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <!-- AVATAR -->
  <div class="avatar">
    <svg viewBox="0 0 40 40" fill="none">
      <polygon points="20,8 36,34 4,34" fill="#080808"/>
    </svg>
  </div>

  <!-- NAME -->
  <div class="name">Vault<span>r</span></div>
  <div class="handle">@vaultrdev</div>

  <!-- BIO -->
  <div class="bio">
    Curated tools &amp; projects for developers.<br/>
    <strong>Handpicked. Upvoted. Zero noise.</strong>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <span class="divider-label">// links</span>
  </div>

  <!-- LINKS -->
  <div class="links">

    <!-- Vaultr Site — featured -->
    <a class="link-item featured" href="https://www.vaultr.site" target="_blank" rel="noopener" style="animation-delay:0.42s">
      <div class="link-icon">
        <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
          <polygon points="20,8 36,34 4,34" fill="#080808"/>
        </svg>
      </div>
      <div class="link-body">
        <div class="link-title">Vaultr</div>
        <div class="link-sub">vaultr.site — browse the directory</div>
      </div>
      <span class="link-badge">Live ✦</span>
      <span class="link-arrow">↗</span>
    </a>

    <!-- X / Twitter -->
    <a class="link-item" href="https://x.com/vaultrdev" target="_blank" rel="noopener" style="animation-delay:0.52s">
      <div class="link-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text)">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
      <div class="link-body">
        <div class="link-title">X (Twitter)</div>
        <div class="link-sub">@vaultrdev — updates &amp; launches</div>
      </div>
      <span class="link-arrow">↗</span>
    </a>

    <!-- GitHub -->
    <a class="link-item" href="https://github.com/orynthdev-lang" target="_blank" rel="noopener" style="animation-delay:0.62s">
      <div class="link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text)"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
      </div>
      <div class="link-body">
        <div class="link-title">GitHub</div>
        <div class="link-sub">github.com/orynthdev-lang</div>
      </div>
      <span class="link-arrow">↗</span>
    </a>

    <!-- Orynth.dev Profile -->
    <a class="link-item" href="https://vaultr.site" target="_blank" rel="noopener" style="animation-delay:0.72s">
      <div class="link-icon">
        <span style="font-size:1rem;">◈</span>
      </div>
      <div class="link-body">
        <div class="link-title">Orynth Profile</div>
        <div class="link-sub">vaultr.site</div>
      </div>
      <span class="link-arrow">↗</span>
    </a>

  </div>

  <!-- PAGE FOOTER -->
  <div class="page-footer" style="animation-fill-mode:both;">
    built with ♥ by vaultr.site
  </div>

</div>

</body>
</html>
